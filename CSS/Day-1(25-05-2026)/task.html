<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./task.css">
</head>
<body>
    <!-- OUTER DIV -->
    <div class="outer">
        <h1>Place an Order</h1>

        <!-- INNER DIV -->
        <div id="inner">
            <h2>Billing Address</h2>
            
            <!-- FORM -->
            <form action="">

                <label for="fname">First name 
                    <input type="text">
                </label>
                <br>
                <br>
                <label for="lname">Last name 
                    <input type="text">
                </label>
                <br>
                <br>
                <label style="margin-left: -23px;" for="add">Street Address 
                    <input type="text">
                </label>
                <br>
                <br>
                <label style="margin-left: 40px;" for="city">City 
                    <input type="text">
                </label>
                <br>
                <br>
                <label style="margin-left: -70px;" for="state">State 
                    <select name="state" id="state">
                        <option value="">-Select-</option>
                        <option value="AP">AP</option>
                        <option value="TG">TG</option>
                        <option value="TN">TN</option>
                    </select>
                </label>
                <br>
                <br>
                <input style="margin-left: -40px;" type="submit">

            </form>
        </div>
    </div>
</body>
</html>
