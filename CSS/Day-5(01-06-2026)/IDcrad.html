<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Card</title>
    <link rel="stylesheet" href="IDcrad.css">
</head>

<body>
    <div class="card">
        <div class="head">
            <img src="./asserts/logo.png" alt="">
            <div class="title">
                <h1>OPPTY TECHHUB</h1>
                <h3>PRIVATE LIMITED</h3>
            </div>
        </div>
        <div class="content">
            <div class="img">
                <img src="./asserts/passpic.png" alt="" width="200px" height="240px">
            </div>
            <div class="form">
                <label for="id">ID</label>
                <input type="text">
                <br>
                <br>
                <label for="name">Name</label>
                <input type="text">
                <br>
                <br>
                <label for="role">Role</label>
                <input type="text">
                <br>
                <br>
                <label for="dob">DOB</label>
                <input type="text">
                <br>
                <br>
                <label for="add">Address</label>
                <input type="text">
                <br>
                <br>
                <label for="phone">Phone</label>
                <input type="text">
                <br>
                <br>
                <div class="footer">
                    <img src="./asserts/barcode.gif" alt="" width="200px" height="70px">
                    <p id="sign">Manager</p>
                </div>
            </div>
        </div>


    </div>
</body>

</html>
