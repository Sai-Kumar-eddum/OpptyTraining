<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 20px
        }
        div{
            width: 50px;
            height: 50px;
            padding: 100px;
        }
        .box1{
            background-color: red;
        }
        .box1:hover{
            background-color: rgb(248, 128, 128);
            transform: rotate(360deg);
            border-radius: 50%;
            transition-duration: 2s;
            transition-timing-function: ease-in;
        }
        .box2{
            background-color: green;
        }
        .box2:hover{
            background-color: rgb(111, 238, 117);
            transform:translate(100px,100px);
            border-radius: 50%;
            transition-duration: 2s;
        }
        .box3{
            background-color: yellow;
        }
        .box3:hover{
            background-color: rgb(97, 94, 7);
            transform: skew(20deg,10deg);
            border-radius: 50%;
            transition-duration: 2s;
            transition-timing-function: ease-out;
        }
        .box4{
            background-color: darkorange;
            perspective: 200px;
        }
        .box4:hover{
            background-color: rgb(251, 96, 0);
            transform: Scale(0.8);
            border-radius: 50%;
            transition-duration: 2s;
        }
        .box5{
            background-color: blue;
        }
        .box5:hover{
            background-color: rgb(0, 242, 254);
            transform:matrix(0.5,-1.2,0.8,0.6,100,-100);
            border-radius: 50%;
            transition-duration: 3s;
            transition-timing-function: ease-in-out;
        }
    </style>
</head>
<body>
    <div class="box1">
        Rotate
    </div>
    <div class="box2">
        Translate
    </div>
    <div class="box3">
        Skew
    </div>
    <div class="box4">
        Scale
    </div>
    <div class="box5">
        Matrix
    </div>

</body>
</html>
