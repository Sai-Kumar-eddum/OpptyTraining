<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            display: grid;

            grid-template-columns: 200px 1fr 1fr;
            grid-template-rows: 80px 300px 80px;

            grid-template-areas:
                "header header header"
                "sidebar content content"
                "footer footer footer";
            gap: 10px;
        }

        .header {
            grid-area: header;
            background: red;
        }

        .sidebar {
            grid-area: sidebar;
            background: blue;
        }

        .content {
            grid-area: content;
            background: green;
        }

        .footer {
            grid-area: footer;
            background: black;
            color: white;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">Header</div>
        <div class="sidebar">Sidebar</div>
        <div class="content">Content</div>
        <div class="footer">Footer</div>
    </div>
    <div class="a">
                <figure>
                <img src="https://tse4.mm.bing.net/th/id/OIP.4dQkxLm-cAndV-9OfVjjQwHaE8?pid=Api&P=0&h=180" alt="pic">
                <figcaption>HTML</figcaption>
                </figure>
                </div>
</body>

</html>
