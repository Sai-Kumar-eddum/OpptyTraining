<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Profile page</title>
    <style>
        body{
            background: linear-gradient(to left, rgb(255, 182, 193), rgb(251, 192, 255));
        }
        .box{
            width: 450px;
            height: 750px;
            background-color: white;
            margin: 50px auto;
            border-radius: 10px;
        }
        .bt{
           color: black;
           font-size: 20px; 
           padding: 40px;
           padding: 10px 10px 10px 10px;
           font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
        }
        .bb{
            background-color: orange;
            color: black;
            border-radius: 30px;
            width: 400px;
            padding: 10px 10px 10px 10px;
            font-size: 20px;
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
        }
        .pp{
            display: flex;
            /* gap: 200px; */
            margin: 0;
            padding: auto;
            justify-content: space-evenly;
        }
        .hp h2{
            color: rgb(0, 170, 255);
            text-align: center;
            font-size: 40px;
            
        }
        .hp p{
            color: gray;
            text-align: center;
            font-size: 25px;
        }
        .hhp h2{
            color: rgb(0, 170, 255);
            text-align: center;
            font-size: 40px;
        }
        .hhp p{
            color: gray;
            text-align: center;
            font-size: 25px;
        }
        .hpp p{
            color: grey;
            text-align: center;
            font-size: 25px;
        }
        .hpp h2{
            text-align: center;
            font-size: 40px;
        }
        .ii img{
            width: 100%;
            height: 250px;
            border-radius: 10px 10px 0 0;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="ii">
            <img src="./assets/kit.jpeg">
        </div>
        <div class="hpp">
            <h2>Morgan Sweeney</h2>
            <p>Ant Collector</p>
        </div>
        <div class="pp">
            <div class="hp">
                <h2>12</h2>
                <p>Followers</p>
            </div>
            <div class="hhp">
                <h2>1000</h2>
                <p>Following</p>
            </div>
        </div>
        <div class="bt">
                <button class="bb">Follow</button>
                <p>Morgan has collected ants since they were six years pld
                and now has many dozen ants but none inn their pants.
            </p>
        </div>
    </div>
</body>
</html>
