<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <fieldset>
        <legend><h1>Order Form</h1></legend>
        <form action="./index.html">
            <label for="name">Name : 
                <input type="text" placeholder="Enter Name Here">
            </label>
            <br><br>
            <label for="mail">Email : 
                <input type="email" placeholder="Enter Mail Here">
            </label>
            <br><br>
            <label for="gender">Gender : 
                <input type="radio">Male
                <input type="radio">Female
            </label>
            <br><br>
            <label for="items">Items : 
                <input type="checkbox">Mobile
                <input type="checkbox">Laptop
                <input type="checkbox">Shoes
            </label>
            <br><br>
            <label for="add">Address : 
                <textarea name="address" id="add" placeholder="Address Here" rows="10"></textarea>
            </label>
            <br><br>
            <label for="cat">Category : 
                <select name="cat" id="cat">
                    <option value="">Select</option>
                    <option value="">Electronics</option>
                    <option value="">Clothing</option>
                    <option value="">Foot Wear</option>
                </select>
            </label>
            <br><br>
            <input type="submit" value="Submit"> <input type="reset" value="Reset">
        </form>
    </fieldset>
</body>
</html>
